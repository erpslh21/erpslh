{% extends "base_tabler.html" %}

{% block content %}
<h2>Edit Flock: {{ flock.name }}</h2>

<div class="card">
  <div class="card-body">
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label for="farm_id" class="form-label required">Breeder</label>
        <select name="farm_id" id="farm_id" class="form-select" required>
          <option value="" disabled>Select a farm...</option>
          {% for farm in farms %}
            <option value="{{ farm.id }}" {% if flock.farm_id == farm.id %}selected{% endif %}>{{ farm.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">House</label>
        <input type="text" class="form-control" value="{{ flock.house.name }}" disabled>
      </div>

      <div class="mb-3">
        <label for="name" class="form-label">Flock Name</label>
        <input type="text" class="form-control" id="name" name="name" value="{{ flock.name }}" required>
      </div>

      <div class="mb-3">
        <label for="intake_date" class="form-label">Intake Date</label>
        <input type="date" class="form-control" id="intake_date" name="intake_date" value="{{ flock.intake_date }}" required>
      </div>

      <div class="mb-3">
        <label for="start_of_lay_date" class="form-label">Start of Lay Date (5% Production)</label>
        <input type="date" class="form-control" id="start_of_lay_date" name="start_of_lay_date" value="{{ flock.start_of_lay_date or '' }}" readonly disabled>
        <div class="form-text">Automatically calculated when production hits 5%. Required for Production Summary.</div>
      </div>

      <div class="row">
        <div class="col-6 mb-3">
          <label for="intake_male" class="form-label">Intake Male</label>
          <input type="number" class="form-control" id="intake_male" name="intake_male" value="{{ flock.intake_male }}">
        </div>
        <div class="col-6 mb-3">
          <label for="intake_female" class="form-label">Intake Female</label>
          <input type="number" class="form-control" id="intake_female" name="intake_female" value="{{ flock.intake_female }}">
        </div>
      </div>

      <div class="row">
        <div class="col-6 mb-3">
          <label for="doa_male" class="form-label">DOA Male</label>
          <input type="number" class="form-control" id="doa_male" name="doa_male" value="{{ flock.doa_male }}">
        </div>
        <div class="col-6 mb-3">
          <label for="doa_female" class="form-label">DOA Female</label>
          <input type="number" class="form-control" id="doa_female" name="doa_female" value="{{ flock.doa_female }}">
        </div>
      </div>

      <hr>
      <h5>Production Phase Baseline</h5>
      <p class="text-muted small">Update these counts only if correcting the baseline at start of production.</p>

      <div class="row">
        <div class="col-6 mb-3">
          <label for="prod_start_male" class="form-label">Production Start Male (Prod)</label>
          <input type="number" class="form-control" id="prod_start_male" name="prod_start_male" value="{{ flock.prod_start_male }}">
        </div>
        <div class="col-6 mb-3">
          <label for="prod_start_female" class="form-label">Production Start Female (Prod)</label>
          <input type="number" class="form-control" id="prod_start_female" name="prod_start_female" value="{{ flock.prod_start_female }}">
        </div>
      </div>

      <div class="row">
        <div class="col-6 mb-3">
          <label for="prod_start_male_hosp" class="form-label">Production Start Male (Hosp)</label>
          <input type="number" class="form-control" id="prod_start_male_hosp" name="prod_start_male_hosp" value="{{ flock.prod_start_male_hosp }}">
        </div>
        <div class="col-6 mb-3">
          <label for="prod_start_female_hosp" class="form-label">Production Start Female (Hosp)</label>
          <input type="number" class="form-control" id="prod_start_female_hosp" name="prod_start_female_hosp" value="{{ flock.prod_start_female_hosp }}">
        </div>
      </div>

      <div class="d-flex justify-content-between">
          <a href="{{ get_dashboard_url(current_user) }}" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
