name: Staging Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/models/**'
      - 'migrations/**'
      - '.github/workflows/main.yml'
  push:
    branches:
      - main

jobs:
  test-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Database Migrations
        env:
          FLASK_APP: run.py
          DATABASE_URL: sqlite:///instance/farm_blank.db
        run: |
          mkdir -p instance
          # This runs flask db upgrade to verify migrations don't throw OperationalErrors
          # Note: If there are existing errors in historical migration files, this might fail
          # until the migration history is cleaned up.
          flask db upgrade
